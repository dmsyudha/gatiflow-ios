name: Release

on:
  push:
    tags:
      - '*'

jobs:
  validate:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
