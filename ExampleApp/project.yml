name: ExampleApp
options:
  bundleIdPrefix: dev.gatiflow
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

packages:
  GatiFlow:
    path: ..

targets:
  # ── iOS app ────────────────────────────────────────────────────────────────
  ExampleApp:
    type: application
    platform: iOS
    sources:
      - ExampleApp
    dependencies:
      - package: GatiFlow
    info:
      path: ExampleApp/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        GatiFlowAppToken: mhub_YOUR_APP_TOKEN_HERE
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: YES
